Schedule:
  ScheduleTypeLimits:
  - Name: Fraction
    Lower Limit Value: 0.0
    Upper Limit Value: 1.0
    Numeric Type: CONTINUOUS
    Unit Type: Dimensionless
  - Name: Temperature
    Lower Limit Value: -60.0
    Upper Limit Value: 200.0
    Numeric Type: CONTINUOUS
    Unit Type: Temperature
  - Name: Any Number
    Numeric Type: CONTINUOUS
    Unit Type: Dimensionless
  Schedule:Compact:
  - Name: Occupancy_Schedule
    Schedule Type Limits Name: Fraction
    Data:
    - Through: 12/31
      Days:
      - For: Weekdays
        Times:
        - Until:
            Time: 08:00
            Value: 0.1
        - Until:
            Time: '18:00'
            Value: 1.0
        - Until:
            Time: '24:00'
            Value: 0.1
      - For: Weekends
        Times:
        - Until:
            Time: 09:00
            Value: 0.1
        - Until:
            Time: '17:00'
            Value: 0.5
        - Until:
            Time: '24:00'
            Value: 0.1
  - Name: Heating_Setpoint
    Schedule Type Limits Name: Temperature
    Data:
    - Through: 12/31
      Days:
      - For: Weekdays
        Times:
        - Until:
            Time: 08:00
            Value: 16.0
        - Until:
            Time: '18:00'
            Value: 20.0
        - Until:
            Time: '24:00'
            Value: 16.0
      - For: Weekends
        Times:
        - Until:
            Time: 09:00
            Value: 16.0
        - Until:
            Time: '17:00'
            Value: 20.0
        - Until:
            Time: '24:00'
            Value: 16.0
  - Name: Cooling_Setpoint
    Schedule Type Limits Name: Temperature
    Data:
    - Through: 12/31
      Days:
      - For: Weekdays
        Times:
        - Until:
            Time: 08:00
            Value: 30.0
        - Until:
            Time: '18:00'
            Value: 26.0
        - Until:
            Time: '24:00'
            Value: 30.0
      - For: Weekends
        Times:
        - Until:
            Time: 09:00
            Value: 30.0
        - Until:
            Time: '17:00'
            Value: 26.0
        - Until:
            Time: '24:00'
            Value: 30.0
  - Name: Activity_Schedule
    Schedule Type Limits Name: Any Number
    Data:
    - Through: 12/31
      Days:
      - For: AllDays
        Times:
        - Until:
            Time: '24:00'
            Value: 120
  - Name: Always_On
    Schedule Type Limits Name: Fraction
    Data:
    - Through: 12/31
      Days:
      - For: AllDays
        Times:
        - Until:
            Time: '24:00'
            Value: 1.0
