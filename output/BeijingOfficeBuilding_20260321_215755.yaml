Schedule:
  ScheduleTypeLimits:
    - Name: On_Off
      Lower Limit Value: 0
      Upper Limit Value: 1
      Numeric Type: DISCRETE
      Unit Type: Dimensionless
    - Name: Fraction
      Lower Limit Value: 0.0
      Upper Limit Value: 1.0
      Numeric Type: CONTINUOUS
      Unit Type: Dimensionless
    - Name: Temperature
      Numeric Type: CONTINUOUS
      Unit Type: Temperature
    - Name: Any_Number
      Numeric Type: CONTINUOUS
      Unit Type: Dimensionless

  Schedule:Compact:
    - Name: Always_On
      Schedule Type Limits Name: On_Off
      Data:
        - Through: "12/31"
          Days:
          - For: AllDays
            Times:
            - Until:
                Time: "24:00"
                Value: 1

    - Name: Occupancy_Schedule
      Schedule Type Limits Name: Fraction
      Data:
        - Through: "12/31"
          Days:
          - For: Weekdays
            Times:
            - Until:
                Time: "08:00"
                Value: 0.05
            - Until:
                Time: "18:00"
                Value: 0.95
            - Until:
                Time: "24:00"
                Value: 0.05
          - For: Saturday
            Times:
            - Until:
                Time: "09:00"
                Value: 0.05
            - Until:
                Time: "17:00"
                Value: 0.50
            - Until:
                Time: "24:00"
                Value: 0.05
          - For: AllOtherDays
            Times:
            - Until:
                Time: "24:00"
                Value: 0.0

    - Name: Lighting_Schedule
      Schedule Type Limits Name: Fraction
      Data:
        - Through: "12/31"
          Days:
          - For: Weekdays
            Times:
            - Until:
                Time: "08:00"
                Value: 0.05
            - Until:
                Time: "18:00"
                Value: 0.90
            - Until:
                Time: "24:00"
                Value: 0.05
          - For: Saturday
            Times:
            - Until:
                Time: "09:00"
                Value: 0.05
            - Until:
                Time: "17:00"
                Value: 0.50
            - Until:
                Time: "24:00"
                Value: 0.05
          - For: AllOtherDays
            Times:
            - Until:
                Time: "24:00"
                Value: 0.0

    - Name: Activity_Schedule
      Schedule Type Limits Name: Any_Number
      Data:
        - Through: "12/31"
          Days:
          - For: AllDays
            Times:
            - Until:
                Time: "24:00"
                Value: 120

    - Name: HVAC_Availability
      Schedule Type Limits Name: On_Off
      Data:
        - Through: "12/31"
          Days:
          - For: Weekdays
            Times:
            - Until:
                Time: "08:00"
                Value: 0
            - Until:
                Time: "22:00"
                Value: 1
            - Until:
                Time: "24:00"
                Value: 0
          - For: Saturday
            Times:
            - Until:
                Time: "08:00"
                Value: 0
            - Until:
                Time: "18:00"
                Value: 1
            - Until:
                Time: "24:00"
                Value: 0
          - For: AllOtherDays
            Times:
            - Until:
                Time: "24:00"
                Value: 0

    - Name: Heating_Setpoint
      Schedule Type Limits Name: Temperature
      Data:
        - Through: "12/31"
          Days:
          - For: Weekdays
            Times:
            - Until:
                Time: "08:00"
                Value: 16
            - Until:
                Time: "18:00"
                Value: 20
            - Until:
                Time: "24:00"
                Value: 16
          - For: AllOtherDays
            Times:
            - Until:
                Time: "24:00"
                Value: 16

    - Name: Cooling_Setpoint
      Schedule Type Limits Name: Temperature
      Data:
        - Through: "12/31"
          Days:
          - For: Weekdays
            Times:
            - Until:
                Time: "08:00"
                Value: 30
            - Until:
                Time: "18:00"
                Value: 26
            - Until:
                Time: "24:00"
                Value: 30
          - For: AllOtherDays
