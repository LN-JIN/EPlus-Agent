Material:
  - Name: Concrete_200mm
    Type: Standard
    Roughness: MediumRough
    Thickness: 0.20
    Conductivity: 1.73
    Density: 2300
    Specific_Heat: 880

  - Name: EPS_Insulation
    Type: NoMass
    Roughness: MediumRough
    Thermal_Resistance: 1.71

  - Name: Roof_EPS_Insulation
    Type: NoMass
    Roughness: MediumRough
    Thermal_Resistance: 2.39

  - Name: Roof_AirGap
    Type: AirGap
    Thermal_Resistance: 0.18

  - Name: Floor_EPS_Insulation
    Type: NoMass
    Roughness: MediumRough
    Thermal_Resistance: 1.71

  - Name: SimpleGlazing
    Type: Glazing
    U-Factor: 1.8
    Solar_Heat_Gain_Coefficient: 0.52
    Visible_Transmittance: 0.65

Construction:
  - Name: Ext_Wall_Const
    Layers:
      - Concrete_200mm
      - EPS_Insulation

  - Name: Roof_Const
    Layers:
      - Concrete_200mm
      - Roof_AirGap
      - Roof_EPS_Insulation

  - Name: Ground_Floor_Const
    Layers:
      - Concrete_200mm
      - Floor_EPS_Insulation

  - Name: Interior_Floor_Const
    Layers:
      - Concrete_200mm

  - Name: Window_Const
    Layers:
      - SimpleGlazing

