                Value: 0.50
            - Until:
                Time: "24:00"
                Value: 0.20
          - For: AllOtherDays
            Times:
            - Until:
                Time: "24:00"
                Value: 0.20

    # Activity level (residential)
    - Name: Activity_Schedule
      Schedule Type Limits Name: Any_Number
      Data:
        - Through: "12/31"
          Days:
          - For: AllDays
            Times:
            - Until:
                Time: "24:00"
                Value: 120

    # HVAC availability: weekday 06:00-23:00, weekend 06:00-23:00
    - Name: HVAC_Availability
      Schedule Type Limits Name: On_Off
      Data:
        - Through: "12/31"
          Days:
          - For: Weekdays
            Times:
            - Until:
                Time: "06:00"
                Value: 0
            - Until:
                Time: "23:00"
                Value: 1
            - Until:
                Time: "24:00"
                Value: 0
          - For: Saturday
