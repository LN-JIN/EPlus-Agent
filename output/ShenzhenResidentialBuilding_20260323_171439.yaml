            - Until:
                Time: "06:00"
                Value: 0
            - Until:
                Time: "23:00"
                Value: 1
            - Until:
                Time: "24:00"
                Value: 0
          - For: AllOtherDays
            Times:
            - Until:
                Time: "24:00"
                Value: 0

    # Heating setpoint: 20°C occupied (08:00-22:00 weekday), 16°C otherwise
    - Name: Heating_Setpoint
      Schedule Type Limits Name: Temperature
      Data:
        - Through: "12/31"
          Days:
          - For: Weekdays
            Times:
            - Until:
                Time: "08:00"
                Value: 16
            - Until:
                Time: "22:00"
                Value: 20
            - Until:
                Time: "24:00"
                Value: 16
          - For: AllOtherDays
            Times:
            - Until:
                Time: "24:00"
                Value: 16

    # Cooling setpoint: 26°C occupied (08:00-22:00 weekday), 30°C otherwise
    - Name: Cooling_Setpoint
      Schedule Type Limits Name: Temperature
      Data:
        - Through: "12/31"
          Days:
          - For: Weekdays
            Times:
            - Until:
                Time: "08:00"
                Value: 30
            - Until:
                Time: "22:00"
                Value: 26
            - Until:
                Time: "24:00"
                Value: 30
          - For: AllOtherDays
            Times:
            - Until:
                Time: "24:00"
                Value: 30

