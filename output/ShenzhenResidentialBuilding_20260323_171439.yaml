# ==================================================================
# EnergyPlus YAML Configuration for Shenzhen Residential Building
# Generated from BuildingIntent JSON
# ==================================================================

SimulationControl:
  Do Zone Sizing Calculation: No
  Do System Sizing Calculation: No
  Do Plant Sizing Calculation: No
  Run Simulation for Sizing Periods: No
  Run Simulation for Weather File Run Periods: Yes
  Do HVAC Sizing Simulation for Sizing Periods: Yes
  Maximum Number of HVAC Sizing Simulation Passes: 1

Building:
  Name: ShenzhenResidentialBuilding
  North Axis: 0
  Terrain: Suburbs
  Loads Convergence Tolerance Value: 0.04
  Temperature Convergence Tolerance Value: 0.40
  Solar Distribution: FullInteriorAndExterior
  Maximum Number of Warmup Days: 25
  Minimum Number of Warmup Days: 6

Timestep:
  Number of Timesteps per Hour: 4

Site:Location:
  Name: Shenzhen_CHN
  Latitude: 22.54
  Longitude: 114.00
  Time Zone: 8.00
  Elevation: 4.00

RunPeriod:
  Name: Annual_Run
  Begin Month: 1
  Begin Day of Month: 1
  Begin Year: 2024
  End Month: 12
  End Day of Month: 31
  End Year: 2024
  Day of Week for Start Day: Monday
  Use Weather File Holidays and Special Days: Yes
  Use Weather File Daylight Saving Period: Yes
  Apply Weekend Holiday Rule: No
  Use Weather File Rain Indicators: Yes
  Use Weather File Snow Indicators: Yes

# ==================================================================
# Materials
# Derived from BuildingIntent.envelope:
#   wall_u=1.0 → R_ins = 1/1.0 - 0.116 - 0.17 = 0.71 → EPS_Insulation R=0.71
#   roof_u=0.6 → R_ins = 1/0.6 - 0.116 - 0.18 - 0.17 = 1.20 → Roof_EPS_Insulation R=1.20
#   floor_u=0.8 → R_ins = 1/0.8 - 0.116 - 0.17 = 0.96 → Floor_EPS_Insulation R=0.96
# ==================================================================
Material:
  - Name: Concrete_200mm
    Type: Standard
    Roughness: MediumRough
    Thickness: 0.20
    Conductivity: 1.73
    Density: 2300
    Specific_Heat: 880

  - Name: EPS_Insulation
    Type: NoMass
    Roughness: MediumRough
    Thermal_Resistance: 0.71

  - Name: Roof_EPS_Insulation
    Type: NoMass
    Roughness: MediumRough
    Thermal_Resistance: 1.20

  - Name: Roof_AirGap
    Type: AirGap
    Thermal_Resistance: 0.18

  - Name: Floor_EPS_Insulation
    Type: NoMass
    Roughness: MediumRough
    Thermal_Resistance: 0.96

  - Name: SimpleGlazing
    Type: Glazing
    U-Factor: 2.7
    Solar_Heat_Gain_Coefficient: 0.60
    Visible_Transmittance: 0.72

# ==================================================================
# Constructions
# ==================================================================
Construction:
  - Name: Ext_Wall_Const
    Layers:
      - Concrete_200mm
      - EPS_Insulation

  - Name: Roof_Const
    Layers:
      - Concrete_200mm
      - Roof_AirGap
      - Roof_EPS_Insulation

  - Name: Ground_Floor_Const
    Layers:
      - Concrete_200mm
      - Floor_EPS_Insulation

  - Name: Interior_Floor_Const
    Layers:
      - Concrete_200mm

  - Name: Window_Const
    Layers:
      - SimpleGlazing

GlobalGeometryRules:
  Starting Vertex Position: UpperLeftCorner
  Vertex Entry Direction: Counterclockwise
  Coordinate System: World

# ==================================================================
