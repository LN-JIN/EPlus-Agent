# ==================================================================
# Schedules
# Derived from BuildingIntent.schedule:
#   weekday_start=08:00, weekday_end=22:00
#   weekend_start=08:00, weekend_end=22:00
#   hvac_weekday_start=06:00, hvac_weekday_end=23:00
#   hvac_weekend_start=06:00, hvac_weekend_end=23:00
#   heating_setpoint=20, cooling_setpoint=26
#   heating_setback=16, cooling_setup=30
# ==================================================================
Schedule:
  ScheduleTypeLimits:
    - Name: On_Off
      Lower Limit Value: 0
      Upper Limit Value: 1
      Numeric Type: DISCRETE
      Unit Type: Dimensionless
    - Name: Fraction
      Lower Limit Value: 0.0
      Upper Limit Value: 1.0
      Numeric Type: CONTINUOUS
      Unit Type: Dimensionless
    - Name: Temperature
      Numeric Type: CONTINUOUS
      Unit Type: Temperature
    - Name: Any_Number
      Numeric Type: CONTINUOUS
      Unit Type: Dimensionless

  Schedule:Compact:
    - Name: Always_On
      Schedule Type Limits Name: On_Off
      Data:
        - Through: "12/31"
          Days:
          - For: AllDays
            Times:
            - Until:
                Time: "24:00"
                Value: 1

    # Occupancy schedule: residential pattern
    - Name: Occupancy_Schedule
      Schedule Type Limits Name: Fraction
      Data:
        - Through: "12/31"
          Days:
          - For: Weekdays
            Times:
            - Until:
                Time: "08:00"
                Value: 0.10
            - Until:
                Time: "22:00"
                Value: 0.80
            - Until:
                Time: "24:00"
                Value: 0.10
          - For: Saturday
            Times:
            - Until:
                Time: "08:00"
                Value: 0.10
            - Until:
                Time: "22:00"
                Value: 0.70
            - Until:
                Time: "24:00"
                Value: 0.10
          - For: AllOtherDays
            Times:
            - Until:
                Time: "24:00"
                Value: 0.10

    # Lighting schedule: residential pattern
    - Name: Lighting_Schedule
      Schedule Type Limits Name: Fraction
      Data:
        - Through: "12/31"
          Days:
          - For: Weekdays
            Times:
            - Until:
                Time: "08:00"
                Value: 0.10
            - Until:
                Time: "22:00"
                Value: 0.70
            - Until:
