      Data:
        - Through: "12/31"
          Days:
          - For: "Weekdays"
            Times:
            - Until:
                Time: "08:00"
                Value: 0.0
            - Until:
                Time: "18:00"
                Value: 1.0
            - Until:
                Time: "24:00"
                Value: 0.0
          - For: "Saturday"
            Times:
            - Until:
                Time: "09:00"
                Value: 0.0
            - Until:
                Time: "17:00"
                Value: 1.0
            - Until:
                Time: "24:00"
                Value: 0.0
          - For: "AllOtherDays"
            Times:
            - Until:
                Time: "24:00"
                Value: 0.0

    - Name: "Office_Occupancy_Schedule"
      Schedule Type Limits Name: "Fraction" 
      Data:
        - Through: "12/31"
          Days:
          - For: "Weekdays"
            Times:
            - Until:
                Time: "08:00"
                Value: 0.0
            - Until:
                Time: "18:00"
                Value: 1.0
            - Until:
                Time: "24:00"
                Value: 0.0
