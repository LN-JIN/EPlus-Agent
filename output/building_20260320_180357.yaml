# ==================================================================
# 模拟控制
# ==================================================================
SimulationControl:
    Do Zone Sizing Calculation: No
    Do System Sizing Calculation: No
    Do Plant Sizing Calculation: No
    Run Simulation for Sizing Periods: No
    Run Simulation for Weather File Run Periods: Yes
    Do HVAC Sizing Simulation for Sizing Periods: Yes
    Maximum Number of HVAC Sizing Simulation Passes: 1

# ==================================================================
# 建筑概况
# ==================================================================
Building:
    Name: Office
    North Axis: 0 # degrees
    Terrain: Suburbs
    Loads Convergence Tolerance Value: 0.04
    Temperature Convergence Tolerance Value: 0.40
    Solar Distribution: FullInteriorAndExterior
    Maximum Number of Warmup Days: 25
    Minimum Number of Warmup Days: 6

# ==================================================================
# 时间步长
# ==================================================================
Timestep:
    Number of Timesteps per Hour: 4

# ==================================================================
# 场地区位
# ==================================================================
Site:Location:
    Name: Beijing_BJ_CHN Design_Conditions
    Latitude : 39.92 # degrees
    Longitude : 116.46 # degrees
    Time Zone : 8.00 # hours
    Elevation : 44.00 # meters

# ==================================================================
# 运行周期
# ==================================================================
RunPeriod:
    Name: Run Period 1
    Begin Month: 1
    Begin Day of Month: 1
    Begin Year: 2024
    End Month: 12
    End Day of Month: 31
    End Year: 2024
    Day of Week for Start Day: Monday
    Use Weather File Holidays and Special Days: Yes
    Use Weather File Daylight Saving Period: Yes
    Apply Weekend Holiday Rule: No
    Use Weather File Rain Indicators: Yes
    Use Weather File Snow Indicators: Yes

# ==================================================================
# 材料
# ==================================================================
Material:
  - Name: Concrete_20cm
    Type: Standard
    Roughness: MediumRough
    Thickness: 0.2
    Conductivity: 1.73
    Density: 2300
    Specific_Heat: 880

  - Name: Gypsum_1.3cm
    Type: Standard
    Roughness: Smooth
    Thickness: 0.0127
    Conductivity: 0.16
    Density: 785
    Specific_Heat: 830

  - Name: EPS_Insulation
    Type: NoMass
    Roughness: MediumRough
    Thermal_Resistance: 1.71

  - Name: Roof_AirGap
    Type: AirGap
    Thermal_Resistance: 0.18

  - Name: SimpleGlazingSystem
    Type: Glazing
    U-Factor: 1.8
    Solar_Heat_Gain_Coefficient: 0.52
    Visible_Transmittance: 0.65

# ==================================================================
# 构造
# ==================================================================
Construction:
  - Name: Exterior_Wall_Const
    Layers:
      - Concrete_20cm
      - EPS_Insulation
  - Name: Interior_Wall_Const
    Layers:
      - Gypsum_1.3cm
      - Gypsum_1.3cm
  - Name: Roof_Const
    Layers:
      - Concrete_20cm
      - Roof_AirGap
      - EPS_Insulation
  - Name: Floor_Const
    Layers:
      - Concrete_20cm
      - EPS_Insulation
  - Name: Ceiling_Const
    Layers:
      - Gypsum_1.3cm
      - Gypsum_1.3cm
  - Name: Window_Const
    Layers:
      - SimpleGlazingSystem

# ==================================================================
# 全局几何规则
# ==================================================================
GlobalGeometryRules:
    Starting Vertex Position: UpperLeftCorner
    Vertex Entry Direction: Counterclockwise
    Coordinate System: World

