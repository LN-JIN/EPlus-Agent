Schedule:
  ScheduleTypeLimits:
    - Name: On/Off
      Lower Limit Value: 0
      Upper Limit Value: 1
      Numeric Type: DISCRETE
      Unit Type: Dimensionless
    - Name: Temperature
      Numeric Type: CONTINUOUS  
      Unit Type: Temperature
    - Name: Fraction
      Lower Limit Value: 0.0
      Upper Limit Value: 1.0
      Numeric Type: CONTINUOUS
      Unit Type: Dimensionless
    - Name: Any Number
      Numeric Type: CONTINUOUS
      Unit Type: Dimensionless
  Schedule:Compact:
    - Name: Always On
      Schedule Type Limits Name: On/Off
      Data:
        - Through: "12/31"
          Days:
          - For: "AllDays"
            Times:
            - Until:
                Time: "24:00"
                Value: 1

    - Name: Heating_Setpoint_Schedule
      Schedule Type Limits Name: Temperature
      Data:
        - Through: "12/31"
          Days:
          - For: "Weekdays"
            Times:
            - Until:
                Time: "08:00"
                Value: 16
            - Until:
                Time: "18:00"
                Value: 20
            - Until:
                Time: "24:00"
                Value: 16
          - For: "Saturday"
            Times:
            - Until:
                Time: "09:00"
                Value: 16
            - Until:
                Time: "17:00"
                Value: 20
            - Until:
                Time: "24:00"
                Value: 16
          - For: "AllOtherDays"
            Times:
            - Until:
                Time: "24:00"
                Value: 16

    - Name: Cooling_Setpoint_Schedule
      Schedule Type Limits Name: Temperature
      Data:
        - Through: "12/31"
          Days:
          - For: "Weekdays"
            Times:
            - Until:
                Time: "08:00"
                Value: 30
            - Until:
                Time: "18:00"
                Value: 26
            - Until:
                Time: "24:00"
                Value: 30
          - For: "Saturday"
            Times:
            - Until:
                Time: "09:00"
                Value: 30
            - Until:
                Time: "17:00"
                Value: 26
            - Until:
                Time: "24:00"
                Value: 30
          - For: "AllOtherDays"
            Times:
            - Until:
                Time: "24:00"
                Value: 30

    - Name: "Office_Lighting_Schedule"
